name: Finaliser le regroupement du battlefield

on:
  push:
    branches:
      - cleanup/preserve-ui

permissions:
  contents: write

jobs:
  finalize-cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer la branche
        uses: actions/checkout@v4
        with:
          ref: cleanup/preserve-ui

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Charger le CSS du battlefield avec son composant
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises'

          const mainPath = 'src/main.tsx'
          const battlefieldPath = 'src/tactical-board/features/battlefield/Battlefield.tsx'
          const performanceImport = "import './Battlefield.performance.css'"

          const main = await readFile(mainPath, 'utf8')
          const nextMain = main.replace(
            "import '@/tactical-board/features/battlefield/Battlefield.performance.css'\n",
            '',
          )
          await writeFile(mainPath, nextMain, 'utf8')

          const battlefield = await readFile(battlefieldPath, 'utf8')
          const stylesImport = "import styles from './Battlefield.module.css'"
          const nextBattlefield = battlefield.includes(performanceImport)
            ? battlefield
            : battlefield.replace(
                stylesImport,
                `${stylesImport}\n${performanceImport}`,
              )
          await writeFile(battlefieldPath, nextBattlefield, 'utf8')
          NODE

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier les types
        run: npm run typecheck

      - name: Vérifier le lint
        run: npm run lint

      - name: Exécuter les tests
        run: npm run test

      - name: Construire le site
        run: npm run build

      - name: Enregistrer le regroupement et supprimer ce workflow temporaire
        run: |
          rm -f .github/workflows/strip-generated-comments.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: finalize cleanup while preserving the UI"
          git push
