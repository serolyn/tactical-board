name: Valider le nettoyage sans modifier le rendu

on:
  push:
    branches:
      - cleanup/preserve-ui

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4
        with:
          ref: cleanup/preserve-ui

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier les types
        run: npm run typecheck

      - name: Vérifier le lint
        run: npm run lint

      - name: Exécuter les tests
        run: npm run test

      - name: Construire le site
        run: npm run build

      - name: Marquer la validation réussie
        run: |
          printf '%s\n' "$GITHUB_SHA" > .cleanup-validation-passed
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cleanup-validation-passed
          git commit -m "ci: mark cleanup validation passed"
          git push
