name: Valider le nettoyage sans modifier le rendu

on:
  push:
    branches:
      - cleanup/preserve-ui

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier les types
        run: npm run typecheck

      - name: Vérifier le lint
        run: npm run lint

      - name: Exécuter les tests
        run: npm run test

      - name: Construire le site
        run: npm run build
