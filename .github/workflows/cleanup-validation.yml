name: Diagnostiquer le nettoyage

on:
  push:
    branches:
      - cleanup/preserve-ui

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4
        with:
          ref: cleanup/preserve-ui

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Exécuter les contrôles et conserver le résultat
        run: |
          set +e

          npm ci > /tmp/npm-ci.log 2>&1
          INSTALL_CODE=$?

          if [ "$INSTALL_CODE" -eq 0 ]; then
            npm run typecheck > /tmp/typecheck.log 2>&1
            TYPECHECK_CODE=$?
            npm run lint > /tmp/lint.log 2>&1
            LINT_CODE=$?
            npm run test > /tmp/test.log 2>&1
            TEST_CODE=$?
            npm run build > /tmp/build.log 2>&1
            BUILD_CODE=$?
          else
            TYPECHECK_CODE=99
            LINT_CODE=99
            TEST_CODE=99
            BUILD_CODE=99
          fi

          {
            echo "commit=$GITHUB_SHA"
            echo "npm_ci=$INSTALL_CODE"
            echo "typecheck=$TYPECHECK_CODE"
            echo "lint=$LINT_CODE"
            echo "test=$TEST_CODE"
            echo "build=$BUILD_CODE"
            echo
            echo "--- typecheck ---"
            tail -n 80 /tmp/typecheck.log 2>/dev/null || true
            echo
            echo "--- lint ---"
            tail -n 80 /tmp/lint.log 2>/dev/null || true
            echo
            echo "--- tests ---"
            tail -n 80 /tmp/test.log 2>/dev/null || true
            echo
            echo "--- build ---"
            tail -n 80 /tmp/build.log 2>/dev/null || true
            echo
            echo "--- npm ci ---"
            tail -n 80 /tmp/npm-ci.log 2>/dev/null || true
          } > .cleanup-validation-report

      - name: Publier le rapport de validation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cleanup-validation-report
          git commit -m "ci: publish cleanup validation report"
          git push
