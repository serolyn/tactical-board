name: Valider la restauration SRO

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier les types
        id: typecheck
        continue-on-error: true
        run: npm run typecheck 2>&1 | tee typecheck.log

      - name: Enregistrer le rapport TypeScript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-sro
          path: typecheck.log

      - name: Arrêter si TypeScript échoue
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Vérifier le lint
        run: npm run lint

      - name: Exécuter les tests
        run: npm run test

      - name: Construire le site
        run: npm run build -- --base=/tactical-board/
