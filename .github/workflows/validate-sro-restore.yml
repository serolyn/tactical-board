name: Valider la restauration SRO

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer la branche de restauration
        uses: actions/checkout@v4
        with:
          ref: fix/restore-complete-sro

      - name: Corriger uniquement la référence TypeScript commentée
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/portfolio/webgl/shaders/mikuscene.tsx')
          content = path.read_text()
          old = """    const time =
      clock.elapsedTime //donne le temps qui est passe a chaque frame
"""
          new = """    // const time = clock.elapsedTime // référence : temps écoulé depuis le début de la scène
"""

          if old in content:
              path.write_text(content.replace(old, new, 1))
          PY

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/portfolio/webgl/shaders/mikuscene.tsx
            git commit -m "fix: conserver la référence pédagogique sans erreur TypeScript"
            git push origin HEAD:fix/restore-complete-sro
          fi

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier les types
        run: npm run typecheck

      - name: Vérifier le lint
        run: npm run lint

      - name: Exécuter les tests
        run: npm run test

      - name: Construire le site
        run: npm run build -- --base=/tactical-board/
