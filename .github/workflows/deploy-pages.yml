name: Publier sur GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      # `npm run build` exécute déjà `tsc -b`, donc le typecheck n'est pas répété.
      - name: Construire le site
        run: npm run build -- --base=/tactical-board/

      - name: Vérifier la home portfolio publiée
        run: |
          grep -q '<title>SEROLYN' dist/index.html
          grep -q '/tactical-board/assets/' dist/index.html

      - name: Vérifier l'isolation portfolio et Tactical Board
        run: npm run test -- src/tests/routingIsolation.test.tsx

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer les fichiers publiés
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publier
        id: deployment
        uses: actions/deploy-pages@v4
